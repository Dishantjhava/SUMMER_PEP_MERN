<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple todo app to manage tasks">
    <title>My Todo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Todo App</h1>
        <p id="counter">Total Tasks: 0</p>
        <section>
            <h2>Add Todo</h2>
            <form>
                <div>
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="Enter task title here">
                </div>
                <div>
                    <label for="desc">Description</label>
                    <textarea name="" id="desc" placeholder="Enter task details here"></textarea>
                </div>
                <button type="submit">Add Todo</button>
            </form>
        </section>
        <section>
            <h2>Todo List</h2>
            <!-- todos will appear here -->
            <ul id="todos">
            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
